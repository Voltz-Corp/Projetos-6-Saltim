services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: saltim
      POSTGRES_PASSWORD: saltim123
      POSTGRES_DB: saltim_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saltim -d saltim_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
